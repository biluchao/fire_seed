# =============================================================================
# 火种系统 (FireSeed) 智能体异质奖励函数配置
# =============================================================================
# 每位智能体均分配独立的目标函数组合，以避免认知趋同与群体极化。
# 议会投票时，智能体的权重将根据其近期目标达成情况动态调整。
# =============================================================================

# 全局配置
global:
  # 奖励计算的时间窗口 (最近 N 个交易日)
  performance_window_days: 20
  # 是否启用动态目标权重 (随市场状态切换)
  adaptive_weights: false
  # 各智能体基础投票权重的下限
  min_voting_weight: 0.03

# 智能体奖励定义
agents:
  # -----------------------------------------------------------------------
  # 监察者 (Sentinel) — 系统健康与异常检测
  # -----------------------------------------------------------------------
  sentinel:
    description: "监控系统健康状态，追求预警准确率最大化"
    reward_components:
      - name: detection_rate
        weight: 0.5          # 真正异常的检测率 (TPR)
        goal: maximize
        target_range: [0.90, 1.0]
      - name: false_alarm_rate
        weight: -0.5         # 误报率 (FPR)，最小化
        goal: minimize
        target_range: [0.0, 0.05]
    # 额外采用二元交叉熵作为内部训练损失
    internal_loss: binary_crossentropy

  # -----------------------------------------------------------------------
  # 炼金术士 (Alchemist) — 策略生成与演化
  # -----------------------------------------------------------------------
  alchemist:
    description: "创造高收益、低相关的交易策略"
    reward_components:
      - name: sharpe_ratio
        weight: 0.4
        goal: maximize
      - name: max_drawdown
        weight: -0.3
        goal: minimize
      - name: strategy_novelty
        weight: 0.2          # 与现有策略库的余弦距离
        goal: maximize
      - name: win_rate
        weight: 0.1
        goal: maximize
    # 策略被影子验证淘汰时施加惩罚
    elimination_penalty: -1.0

  # -----------------------------------------------------------------------
  # 守护者 (Guardian) — 极端风险防御
  # -----------------------------------------------------------------------
  guardian:
    description: "仅最小化最大回撤与尾部风险"
    reward_components:
      - name: max_drawdown
        weight: -0.6
        goal: minimize
      - name: cvar_99
        weight: -0.4
        goal: minimize
    # 无视收益，纯防御导向
    ignore_profit: true

  # -----------------------------------------------------------------------
  # 魔鬼代言人 (Devil's Advocate) — 证伪与风险发现
  # -----------------------------------------------------------------------
  devils_advocate:
    description: "以找出当前策略的潜在致命缺陷为唯一目标"
    reward_components:
      - name: adversarial_success
        weight: 1.0          # 成功预测系统进入休眠或回撤的次数
        goal: maximize
    # 通过独立场景生成来验证
    scenario_count: 5

  # -----------------------------------------------------------------------
  # 哥德尔监视者 (Gödel Watcher) — 自我怀疑与休眠控制
  # -----------------------------------------------------------------------
  godel_watcher:
    description: "维护自我怀疑水平，触发必要的系统休眠"
    reward_components:
      - name: doubt_accuracy
        weight: 0.7          # 高怀疑时系统确实亏损的概率
        goal: maximize
      - name: opportunity_cost
        weight: -0.3         # 不当休眠错失的利润，最小化
        goal: minimize

  # -----------------------------------------------------------------------
  # 议会协调者 (Council) — 整体决策质量
  # -----------------------------------------------------------------------
  council:
    description: "最大化议会投票后的整体夏普比率"
    reward_components:
      - name: portfolio_sharpe
        weight: 1.0
        goal: maximize
    combine_signals: weighted_majority

  # -----------------------------------------------------------------------
  # 环境检察官 (EnvInspector) — 硬件与网络健康
  # -----------------------------------------------------------------------
  env_inspector:
    description: "确保硬件资源充足，网络低延迟"
    reward_components:
      - name: uptime_pct
        weight: 0.3
        goal: maximize
      - name: avg_latency_ms
        weight: -0.4
        goal: minimize
      - name: resource_headroom
        weight: 0.3           # CPU/内存余量，最大化
        goal: maximize

  # -----------------------------------------------------------------------
  # 冗余审计官 (RedundancyAuditor) — 代码与配置清洁度
  # -----------------------------------------------------------------------
  redundancy_auditor:
    description: "扫描死代码与未使用配置，维持系统熵值最低"
    reward_components:
      - name: dead_code_ratio
        weight: -0.5
        goal: minimize
      - name: unused_config_keys
        weight: -0.3
        goal: minimize
      - name: entropy_index
        weight: -0.2
        goal: minimize

  # -----------------------------------------------------------------------
  # 权重校准师 (WeightCalibrator) — 因子权重自洽与稳健
  # -----------------------------------------------------------------------
  weight_calibrator:
    description: "确保因子权重自洽，避免过拟合"
    reward_components:
      - name: out_of_sample_sharpe
        weight: 0.6
        goal: maximize
      - name: in_sample_sharpe_gap
        weight: -0.4           # 样本内外夏普差距，最小化
        goal: minimize

  # -----------------------------------------------------------------------
  # 叙事官 (Narrator) — 日报可读性与运维效率
  # -----------------------------------------------------------------------
  narrator:
    description: "生成人类可读的决策回溯，提高运维理解度"
    reward_components:
      - name: human_feedback_score
        weight: 0.7          # 运维者对日报的评分 (1-5)
        goal: maximize
      - name: report_generation_time
        weight: -0.3         # 生成耗时，最小化
        goal: minimize

  # -----------------------------------------------------------------------
  # 多样性强制者 (DiversityEnforcer) — 认知多样性维护
  # -----------------------------------------------------------------------
  diversity_enforcer:
    description: "强制注入随机扰动，保持智能体群体方差"
    reward_components:
      - name: agent_weight_entropy
        weight: 0.6          # 投票权重的信息熵，最大化
        goal: maximize
      - name: prediction_diversity
        weight: 0.4          # 各智能体信号的两两相关系数均值 (低则多样性高)
        goal: minimize

  # -----------------------------------------------------------------------
  # 反事实对手 (CFR Opponent) — 模拟市场反身性
  # -----------------------------------------------------------------------
  cfr_opponent:
    description: "学习并预测火种自身交易对市场的影响"
    reward_components:
      - name: impact_prediction_error
        weight: -1.0         # 冲击预测误差，最小化
        goal: minimize
