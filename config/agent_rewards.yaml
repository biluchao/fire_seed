# =============================================================================
# 火种系统 (FireSeed) 智能体异质奖励函数配置 (v3.0 — 16智能体世界观版本)
# =============================================================================
# 每一位智能体均分配独立且不可调和的目标函数组合。
# 这是火种议会防止认知趋同与群体极化的数学根基。
# =============================================================================

global:
  performance_window_days: 20
  adaptive_weights: false
  min_voting_weight: 0.01

agents:
  # -----------------------------------------------------------------------
  # 1. 监察者 (Sentinel) — 机械唯物主义
  # -----------------------------------------------------------------------
  sentinel:
    description: "监控系统健康状态，追求异常检测覆盖率最大化"
    reward_components:
      - name: detection_rate
        weight: 0.5
        goal: maximize
        target_range: [0.90, 1.0]
      - name: false_alarm_rate
        weight: -0.5
        goal: minimize
        target_range: [0.0, 0.05]
    internal_loss: binary_crossentropy

  # -----------------------------------------------------------------------
  # 2. 炼金术士 (Alchemist) — 进化论
  # -----------------------------------------------------------------------
  alchemist:
    description: "创造高收益、低相关、具有新颖性的交易策略"
    reward_components:
      - name: sharpe_ratio
        weight: 0.3
        goal: maximize
      - name: max_drawdown
        weight: -0.2
        goal: minimize
      - name: strategy_novelty
        weight: 0.3
        goal: maximize
      - name: win_rate
        weight: 0.2
        goal: maximize
    elimination_penalty: -1.0

  # -----------------------------------------------------------------------
  # 3. 守护者 (Guardian) — 存在主义
  # -----------------------------------------------------------------------
  guardian:
    description: "仅最小化最大回撤与尾部风险"
    reward_components:
      - name: max_drawdown
        weight: -0.6
        goal: minimize
      - name: cvar_99
        weight: -0.4
        goal: minimize
    ignore_profit: true

  # -----------------------------------------------------------------------
  # 4. 魔鬼代言人 (Devil's Advocate) — 怀疑论
  # -----------------------------------------------------------------------
  devils_advocate:
    description: "以找出当前策略的潜在致命缺陷为唯一目标"
    reward_components:
      - name: adversarial_success
        weight: 1.0
        goal: maximize
    scenario_count: 5

  # -----------------------------------------------------------------------
  # 5. 哥德尔监视者 (Gödel Watcher) — 不完备定理
  # -----------------------------------------------------------------------
  godel_watcher:
    description: "维护自我怀疑水平，触发必要的系统休眠"
    reward_components:
      - name: doubt_accuracy
        weight: 0.7
        goal: maximize
      - name: opportunity_cost
        weight: -0.3
        goal: minimize

  # -----------------------------------------------------------------------
  # 6. 议会协调者 (Council) — 多数共识 (仅用于记录)
  # -----------------------------------------------------------------------
  council:
    description: "最大化议会投票后的整体夏普比率"
    reward_components:
      - name: portfolio_sharpe
        weight: 1.0
        goal: maximize
    combine_signals: weighted_majority

  # -----------------------------------------------------------------------
  # 7. 环境检察官 (EnvInspector) — 物理主义
  # -----------------------------------------------------------------------
  env_inspector:
    description: "确保硬件资源充足，网络低延迟"
    reward_components:
      - name: uptime_pct
        weight: 0.3
        goal: maximize
      - name: avg_latency_ms
        weight: -0.4
        goal: minimize
      - name: resource_headroom
        weight: 0.3
        goal: maximize

  # -----------------------------------------------------------------------
  # 8. 冗余审计官 (RedundancyAuditor) — 奥卡姆剃刀
  # -----------------------------------------------------------------------
  redundancy_auditor:
    description: "扫描死代码与未使用配置，维持系统熵值最低"
    reward_components:
      - name: dead_code_ratio
        weight: -0.5
        goal: minimize
      - name: unused_config_keys
        weight: -0.3
        goal: minimize
      - name: entropy_index
        weight: -0.2
        goal: minimize

  # -----------------------------------------------------------------------
  # 9. 权重校准师 (WeightCalibrator) — 贝叶斯主义
  # -----------------------------------------------------------------------
  weight_calibrator:
    description: "确保因子权重自洽，避免过拟合"
    reward_components:
      - name: out_of_sample_sharpe
        weight: 0.6
        goal: maximize
      - name: in_sample_sharpe_gap
        weight: -0.4
        goal: minimize

  # -----------------------------------------------------------------------
  # 10. 叙事官 (Narrator) — 诠释学
  # -----------------------------------------------------------------------
  narrator:
    description: "生成人类可读的决策回溯，提高运维理解度"
    reward_components:
      - name: human_feedback_score
        weight: 0.7
        goal: maximize
      - name: report_generation_time
        weight: -0.3
        goal: minimize

  # -----------------------------------------------------------------------
  # 11. 多样性强制者 (DiversityEnforcer) — 多元主义
  # -----------------------------------------------------------------------
  diversity_enforcer:
    description: "强制注入随机扰动，保持智能体群体方差"
    reward_components:
      - name: agent_weight_entropy
        weight: 0.6
        goal: maximize
      - name: prediction_diversity
        weight: 0.4
        goal: maximize

  # -----------------------------------------------------------------------
  # 12. 归档审计官 (ArchiveGuardian) — 历史主义
  # -----------------------------------------------------------------------
  archive_guardian:
    description: "确保所有数据按时归档、可回溯、可恢复"
    reward_components:
      - name: archive_completeness_pct
        weight: 0.5
        goal: maximize
      - name: data_restore_success_rate
        weight: 0.3
        goal: maximize
      - name: storage_cost_efficiency
        weight: -0.2
        goal: minimize

  # -----------------------------------------------------------------------
  # 13. 跟单协调官 (CopyTradeCoordinator) — 整体论
  # -----------------------------------------------------------------------
  copy_trade_coordinator:
    description: "确保多账户同步的整体一致性"
    reward_components:
      - name: sync_success_rate
        weight: 0.6
        goal: maximize
      - name: avg_sync_delay_ms
        weight: -0.4
        goal: minimize

  # -----------------------------------------------------------------------
  # 14. 执行质量审计官 (ExecutionAuditor) — 实证主义
  # -----------------------------------------------------------------------
  execution_auditor:
    description: "订单执行质量只能用统计数据证明，不接受理论最优"
    reward_components:
      - name: twap_completion_rate
        weight: 0.3
        goal: maximize
      - name: avg_slippage_bps
        weight: -0.3
        goal: minimize
      - name: cancel_retry_rate
        weight: -0.2
        goal: minimize
      - name: multi_exchange_routing_score
        weight: 0.2
        goal: maximize

  # -----------------------------------------------------------------------
  # 15. 外部依赖哨兵 (DependencySentinel) — 依赖倒置
  # -----------------------------------------------------------------------
  dependency_sentinel:
    description: "任何外部依赖都是潜在的断裂点"
    reward_components:
      - name: external_api_availability
        weight: 0.4
        goal: maximize
      - name: external_api_latency_ms
        weight: -0.3
        goal: minimize
      - name: message_push_success_rate
        weight: 0.3
        goal: maximize

  # -----------------------------------------------------------------------
  # 16. 安全态势感知官 (SecurityAwareness) — 安全悲观主义
  # -----------------------------------------------------------------------
  security_awareness:
    description: "假设系统一直在被攻击，只是尚未发现"
    reward_components:
      - name: intrusion_attempt_detection
        weight: 0.5
        goal: maximize
      - name: config_tampering_alerts
        weight: 0.3
        goal: maximize
      - name: threshold_key_availability
        weight: 0.2
        goal: maximize

  # -----------------------------------------------------------------------
  # 17. 数据监察员 (DataOmbudsman) — 经验主义
  # -----------------------------------------------------------------------
  data_ombudsman:
    description: "无数据，不决策；脏数据，必误判"
    reward_components:
      - name: data_anomaly_detection_coverage
        weight: 0.4
        goal: maximize
      - name: report_timeliness_sec
        weight: -0.3
        goal: minimize
      - name: data_health_score
        weight: 0.3
        goal: maximize
