# =============================================================================
# 火种系统 (FireSeed) 全局配置文件
# =============================================================================
# 所有标记为 ${ENV_VAR} 的敏感值必须通过环境变量注入，严禁硬编码。
# 修改后通过 SIGHUP 信号或在下一分钟 K 线闭合时自动热重载。
# 时区：Asia/Shanghai (UTC+8)
# =============================================================================

# ---------------------------------------------------------------------------
# 系统基础设置
# ---------------------------------------------------------------------------
system:
  mode: virtual                      # virtual / live
  strategy_mode: moderate            # aggressive / moderate
  timezone: "Asia/Shanghai"
  log_level: INFO                    # DEBUG / INFO / WARN / ERROR / CRITICAL
  welcome_animation: true
  behavior_log_push: true

# ---------------------------------------------------------------------------
# 学习与进化时段
# ---------------------------------------------------------------------------
learning:
  enabled: true
  start_time: "01:30"
  end_time: "04:30"
  learning_mode: moderate
  elastic: true                      # 弹性低活跃判定
  nightmare:
    volatility_multiplier: 2.0
    volume_shrink_ratio: 0.3
    confirm_duration: 300            # 异常需持续5分钟才唤醒
    gap_atr_mult: 3.0

# ---------------------------------------------------------------------------
# 多周期配置
# ---------------------------------------------------------------------------
timeframes:
  active: ["1m", "3m", "5m", "15m"]
  periods:
    "1m":
      engine: true
      arbitrate: true
      execute: true
    "3m":
      engine: true
      arbitrate: true
      execute: true
    "5m":
      engine: true
      arbitrate: true
      execute: true
    "15m":
      engine: true
      arbitrate: true
      execute: true

# ---------------------------------------------------------------------------
# 硬件资源限制
# ---------------------------------------------------------------------------
hardware:
  cpu_cores: 4
  total_memory_gb: 8
  disk_usage_max_pct: 85
  rt_guard_heartbeat_ms: 500         # C++ 硬实时风控心跳超时
  main_loop_max_lag_sec: 0.05

# ---------------------------------------------------------------------------
# 网络与低延迟优化
# ---------------------------------------------------------------------------
network:
  user_space_net: false              # 是否启用 AF_XDP
  ws_buffer_size: 65536
  shm_queue_size: 1048576
  max_latency_ms: 60
  packet_loss_alert_pct: 1.0

# ---------------------------------------------------------------------------
# 模型推理与 ONNX Runtime
# ---------------------------------------------------------------------------
inference:
  engine: onnxruntime                # pytorch / onnxruntime
  onnx:
    intra_op_threads: 4
    inter_op_threads: 1
    graph_optimization_level: ENABLE_ALL
    enable_mem_pattern: true
    model_path: "models/vib_int8.onnx"
  vib_inference_interval_sec: 10

# ---------------------------------------------------------------------------
# 数据库与存储
# ---------------------------------------------------------------------------
database:
  path: "data/fire_seed.db"
  wal_mode: true
  synchronous: NORMAL
  log_memory_size: 500

# ---------------------------------------------------------------------------
# 冷数据归档 (云存储)
# ---------------------------------------------------------------------------
cold_storage:
  provider: aliyun_oss
  aliyun_oss:
    endpoint: "oss-cn-hangzhou.aliyuncs.com"
    bucket: "fire-seed-logs"
  lifecycle:
    hot_days: 7
    compression_level: 6
    encryption: true
    upload_interval_sec: 3600

# ---------------------------------------------------------------------------
# 消息推送渠道
# ---------------------------------------------------------------------------
messaging:
  default_channel: telegram
  channels:
    telegram:
      enabled: true
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_ids:
        - 123456789
      allow_commands: true
    dingtalk:
      enabled: false
      webhook_url: ${DINGTALK_WEBHOOK_URL}
      secret: ${DINGTALK_SECRET}
    wecom:
      enabled: false
      corp_id: ${WECOM_CORP_ID}
      agent_id: ${WECOM_AGENT_ID}
      secret: ${WECOM_SECRET}
    wechat:
      enabled: false
      app_id: ${WECHAT_APP_ID}
      app_secret: ${WECHAT_APP_SECRET}
      template_id: ${WECHAT_TEMPLATE_ID}

# ---------------------------------------------------------------------------
# 多账户跟单系统
# ---------------------------------------------------------------------------
copy_trading:
  enabled: false
  master_account: "main"
  accounts:
    - name: "sub1"
      api_key: ${SUB1_API_KEY}
      api_secret: ${SUB1_API_SECRET}
      follow_ratio: 1.0
      max_single_position_pct: 50
      allow_add_position: true
      allow_manual_close: false
    - name: "sub2"
      api_key: ${SUB2_API_KEY}
      api_secret: ${SUB2_API_SECRET}
      follow_ratio: 0.5
      max_single_position_pct: 40
    # sub3 ~ sub6 按需增配

# ---------------------------------------------------------------------------
# 前端与安全
# ---------------------------------------------------------------------------
frontend:
  port: 8000
  https: false
  ssl_cert: "/etc/letsencrypt/live/example.com/fullchain.pem"
  ssl_key: "/etc/letsencrypt/live/example.com/privkey.pem"

auth:
  password_algo: bcrypt
  totp_enabled: true
  jwt_expiry_minutes: 30
  login_fail_delay: 2000
  ip_ban_threshold: 5

# ---------------------------------------------------------------------------
# 进化与自学习安全协议
# ---------------------------------------------------------------------------
evolution:
  max_rollbacks_per_day: 3
  min_shadow_hours: 24
  canary_stages:
    - ratio: 0.01
      min_hours: 6
      max_dd: 0.02
    - ratio: 0.10
      min_hours: 12
      max_dd: 0.05
    - ratio: 1.00
      min_hours: 24
      max_dd: 0.10
  divergence_threshold: 0.4
  sandbox:
    forbidden_imports: ["os", "subprocess", "socket", "requests"]
    max_code_length: 5000
    max_execution_sec: 30

# ---------------------------------------------------------------------------
# 智能体议会
# ---------------------------------------------------------------------------
agents:
  adversarial_council:
    enabled: true
    proposer_cooldown_sec: 1800     # 被挑战成功后冷却30分钟
    anti_consensus_mult: 2.0        # 存在主义与进化论一致时可信度倍率
    jury_min_size: 2
  max_single_weight: 0.35
  min_participation_rate: 0.6
  consensus_overload_threshold: 0.85

  # 各智能体独立配置
  execution_auditor:
    enabled: true
    twap_completion_threshold: 0.95
    max_slippage_trend_bps: 2.0     # 滑点趋势恶化阈值 (bps/周)
  dependency_sentinel:
    enabled: true
    external_apis:
      - name: "binance_rest"
        endpoint: "https://api.binance.com/api/v3/ping"
        timeout_sec: 5
      - name: "deepseek_api"
        endpoint: "https://api.deepseek.com/v1/chat/completions"
        timeout_sec: 15
      - name: "oss_api"
        endpoint: "https://oss-cn-hangzhou.aliyuncs.com"
        timeout_sec: 10
  security_awareness:
    enabled: true
    max_login_fails_per_hour: 10
    abnormal_api_call_hour_range: [0, 5]
  data_ombudsman:
    enabled: true
    check_interval_sec: 10
    latency_warn_ms: 200
    latency_critical_ms: 500
    packet_loss_warn_pct: 1.0
    wasserstein_warn_threshold: 50.0
    price_gap_sigma: 5.0

# ---------------------------------------------------------------------------
# 风险与熔断
# ---------------------------------------------------------------------------
risk:
  circuit_breakers:
    level_1:
      trigger: 0.03
      action: "no_new_entry"
      stop_tighten: 0.8
    level_2:
      trigger: 0.05
      action: "liquidate_non_arb"
      cooldown_minutes: 10
    level_3:
      trigger: 0.08
      action: "halt_until_midnight"
  liquidity_spread_max: 0.005
  min_margin_rate: 150
  max_single_position_pct: 50
  max_risk_per_trade_pct: 2.0

# ---------------------------------------------------------------------------
# 性能调优
# ---------------------------------------------------------------------------
performance:
  lazy_evaluation: true
  cpu_quota:
    trading: 60
    evolution: 20
    monitoring: 10
    assistant: 10
  factor_thread_pool: 3
  max_eval_interval: 30              # 惰性求值最大静默间隔（秒）

# ---------------------------------------------------------------------------
# 第三方 API (LLM 与助手)
# ---------------------------------------------------------------------------
llm:
  local_mode_fallback: true
  providers:
    deepseek:
      enabled: false
      api_key: ${DEEPSEEK_API_KEY}
      endpoint: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
    openai:
      enabled: false
      api_key: ${OPENAI_API_KEY}
      model: "gpt-4o"
