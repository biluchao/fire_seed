# =============================================================================
# 火种系统 (FireSeed) 全局配置文件
# =============================================================================
# 说明：
#   1. 修改此文件后，系统将自动热重载（部分参数需要重启）。
#   2. 所有敏感信息（API密钥、密码等）通过环境变量注入，不得硬编码于此。
#   3. 时间均以 24 小时制 UTC+8 时区表示。
# =============================================================================

# ---------------------------------------------------------------------------
# 系统基础设置
# ---------------------------------------------------------------------------
system:
  # 运行模式: virtual (虚拟券商) / live (实盘交易)
  mode: virtual

  # 策略激进程度: aggressive (激进) / moderate (稳健)
  strategy_mode: moderate

  # 系统时区 (用于日志、学习时段判断)
  timezone: "Asia/Shanghai"

  # 日志级别: DEBUG / INFO / WARN / ERROR / CRITICAL
  log_level: INFO

  # 是否启用前端欢迎登录动画
  welcome_animation: true

  # 是否启用行为日志 WebSocket 推送
  behavior_log_push: true

# ---------------------------------------------------------------------------
# 学习与进化时段
# ---------------------------------------------------------------------------
learning:
  # 是否启用每日自动学习
  enabled: true

  # 学习时段 (24小时制，弹性学习在此基础上进一步判断)
  start_time: "01:30"
  end_time: "04:30"

  # 学习期间自动切换到的策略模式
  learning_mode: moderate

  # 惊梦唤醒阈值
  nightmare:
    volatility_multiplier: 2.0          # 波动率超24h均值倍数
    volume_shrink_ratio: 0.3            # 成交量萎缩比率
    confirm_duration: 300               # 持续秒数
    gap_atr_mult: 3.0                   # 跳空ATR倍数

# ---------------------------------------------------------------------------
# 多周期配置
# ---------------------------------------------------------------------------
timeframes:
  active: ["1m", "3m", "5m", "15m"]
  periods:
    "1m":
      engine: true
      arbitrate: true
      execute: true
    "3m":
      engine: true
      arbitrate: true
      execute: true
    "5m":
      engine: true
      arbitrate: true
      execute: true
    "15m":
      engine: true
      arbitrate: true
      execute: true

# ---------------------------------------------------------------------------
# 硬件资源限制
# ---------------------------------------------------------------------------
hardware:
  cpu_cores: 4
  total_memory_gb: 8
  disk_usage_max_pct: 85
  rt_guard_heartbeat_ms: 500
  main_loop_max_lag_sec: 0.05

# ---------------------------------------------------------------------------
# 网络与低延迟优化
# ---------------------------------------------------------------------------
network:
  user_space_net: false                 # AF_XDP 用户态网络开关
  ws_buffer_size: 65536
  shm_queue_size: 1048576
  max_latency_ms: 60
  packet_loss_alert_pct: 1.0

# ---------------------------------------------------------------------------
# 模型推理与 ONNX Runtime
# ---------------------------------------------------------------------------
inference:
  engine: onnxruntime
  onnx:
    intra_op_threads: 4
    inter_op_threads: 1
    graph_optimization_level: ENABLE_ALL
    enable_mem_pattern: true
    model_path: "models/vib_int8.onnx"
  vib_inference_interval_sec: 10

# ---------------------------------------------------------------------------
# 数据库与存储
# ---------------------------------------------------------------------------
database:
  path: "data/fire_seed.db"
  wal_mode: true
  synchronous: NORMAL
  log_memory_size: 500

# ---------------------------------------------------------------------------
# 冷数据归档 (云存储)
# ---------------------------------------------------------------------------
cold_storage:
  provider: aliyun_oss
  aliyun_oss:
    endpoint: "oss-cn-hangzhou.aliyuncs.com"
    bucket: "fire-seed-logs"
  lifecycle:
    hot_days: 7
    compression_level: 6
    encryption: true
    upload_interval_sec: 3600

# ---------------------------------------------------------------------------
# 消息推送渠道
# ---------------------------------------------------------------------------
messaging:
  default_channel: telegram
  channels:
    telegram:
      enabled: true
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_ids: [123456789]
      allow_commands: true
    dingtalk:
      enabled: false
      webhook_url: ${DINGTALK_WEBHOOK_URL}
      secret: ${DINGTALK_SECRET}
    wecom:
      enabled: false
      corp_id: ${WECOM_CORP_ID}
      agent_id: ${WECOM_AGENT_ID}
      secret: ${WECOM_SECRET}
    wechat:
      enabled: false
      app_id: ${WECHAT_APP_ID}
      app_secret: ${WECHAT_APP_SECRET}
      template_id: ${WECHAT_TEMPLATE_ID}

# ---------------------------------------------------------------------------
# 多账户跟单系统
# ---------------------------------------------------------------------------
copy_trading:
  enabled: false
  master_account: "main"
  accounts:
    - name: "sub1"
      api_key: ${SUB1_API_KEY}
      api_secret: ${SUB1_API_SECRET}
      follow_ratio: 1.0
      max_pos_pct: 50
    - name: "sub2"
      api_key: ${SUB2_API_KEY}
      api_secret: ${SUB2_API_SECRET}
      follow_ratio: 0.5
      max_pos_pct: 40

# ---------------------------------------------------------------------------
# 前端与安全
# ---------------------------------------------------------------------------
frontend:
  port: 8000
  https: false

auth:
  password_algo: bcrypt
  totp_enabled: true
  jwt_expiry_minutes: 30
  login_fail_delay: 2000
  ip_ban_threshold: 5

# ---------------------------------------------------------------------------
# 进化与自学习安全协议
# ---------------------------------------------------------------------------
evolution:
  max_rollbacks_per_day: 3
  min_shadow_hours: 24
  canary_stages:
    - { ratio: 0.01, min_hours: 6, max_dd: 0.02 }
    - { ratio: 0.10, min_hours: 12, max_dd: 0.05 }
    - { ratio: 1.00, min_hours: 24, max_dd: 0.10 }
  divergence_threshold: 0.4
  sandbox:
    forbidden_imports: ["os", "subprocess", "socket", "requests"]
    max_code_length: 5000
    max_execution_sec: 30

# ---------------------------------------------------------------------------
# 智能体议会 (对抗式)
# ---------------------------------------------------------------------------
agents:
  adversarial_council:
    enabled: true
    cooling_off_sec: 1800               # 挑战成功后的冷却时间 (秒)
    anti_consensus_multiplier: 2.0      # 反共识增强倍率
    min_jury_size: 2                    # 最少陪审员数量
  max_single_weight: 0.35
  min_participation_rate: 0.6
  consensus_overload_threshold: 0.85

# ---------------------------------------------------------------------------
# 风险与熔断
# ---------------------------------------------------------------------------
risk:
  circuit_breakers:
    level_1: { trigger: 0.03, action: "no_new_entry", stop_tighten: 0.8 }
    level_2: { trigger: 0.05, action: "liquidate_non_arb", cooldown_minutes: 10 }
    level_3: { trigger: 0.08, action: "halt_until_midnight" }

  liquidity_spread_max: 0.005
  min_margin_rate: 150
  max_single_position_pct: 50
  max_risk_per_trade_pct: 2.0

# ---------------------------------------------------------------------------
# 性能调优
# ---------------------------------------------------------------------------
performance:
  lazy_evaluation: true
  cpu_quota:
    trading: 60
    evolution: 20
    monitoring: 10
    assistant: 10
  factor_thread_pool: 3
  max_eval_interval: 30

# ---------------------------------------------------------------------------
# 第三方 API (LLM 与助手)
# ---------------------------------------------------------------------------
llm:
  local_mode_fallback: true
  providers:
    deepseek:
      enabled: false
      api_key: ${DEEPSEEK_API_KEY}
      endpoint: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
    openai:
      enabled: false
      api_key: ${OPENAI_API_KEY}
      model: "gpt-4o"
