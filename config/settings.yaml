# =============================================================================
# 火种系统 (FireSeed) 全局配置文件
# =============================================================================
# 修改此文件后，系统将在下一个K线闭合或通过SIGHUP信号实时重载。
# 敏感信息（API密钥、密码等）通过环境变量注入，禁止硬编码。
# =============================================================================

# ---------------------------------------------------------------------------
# 系统基础设置
# ---------------------------------------------------------------------------
system:
  # 运行模式: virtual / live / ghost
  mode: virtual

  # 策略激进程度: aggressive / moderate
  strategy_mode: moderate

  # 系统时区 (用于日志、学习时段判断)
  timezone: "Asia/Shanghai"

  # 日志级别: DEBUG / INFO / WARN / ERROR / CRITICAL
  log_level: INFO

  # 欢迎登录动画 (前端专用)
  welcome_animation: true

  # 行为日志实时推送 (WebSocket)
  behavior_log_push: true

  # 当前OTA版本
  version: "3.0.0-spartan"

# ---------------------------------------------------------------------------
# 学习与进化时段
# ---------------------------------------------------------------------------
learning:
  enabled: true
  start_time: "01:30"
  end_time: "04:30"
  learning_mode: moderate

  nightmare:
    # 波动率倍数：当前波动率超过过去24小时均值的倍数
    volatility_multiplier: 2.0
    # 成交量萎缩阈值：当前1分钟成交量低于过去24小时均值的比率
    volume_shrink_ratio: 0.3
    # 确认时长(秒)：异常需持续多久才触发唤醒
    confirm_duration: 300
    # 跳空幅度阈值（ATR倍数）
    gap_atr_mult: 3.0

# ---------------------------------------------------------------------------
# 多周期配置
# ---------------------------------------------------------------------------
timeframes:
  active: ["1m", "3m", "5m", "15m"]
  periods:
    "1m":
      engine: true
      arbitrate: true
      execute: true
    "3m":
      engine: true
      arbitrate: true
      execute: true
    "5m":
      engine: true
      arbitrate: true
      execute: true
    "15m":
      engine: true
      arbitrate: true
      execute: true

# ---------------------------------------------------------------------------
# 硬件资源限制
# ---------------------------------------------------------------------------
hardware:
  cpu_cores: 4
  total_memory_gb: 8
  disk_usage_max_pct: 85
  rt_guard_heartbeat_ms: 500
  main_loop_max_lag_sec: 0.05

# ---------------------------------------------------------------------------
# 网络与低延迟优化
# ---------------------------------------------------------------------------
network:
  user_space_net: false          # AF_XDP 需内核 >= 5.4
  ws_buffer_size: 65536
  shm_queue_size: 1048576       # 1MB共享内存队列
  max_latency_ms: 60
  packet_loss_alert_pct: 1.0

# ---------------------------------------------------------------------------
# 模型推理与 ONNX Runtime
# ---------------------------------------------------------------------------
inference:
  engine: onnxruntime
  onnx:
    intra_op_threads: 4
    inter_op_threads: 1
    graph_optimization_level: ENABLE_ALL
    enable_mem_pattern: true
    model_path: "models/vib_int8.onnx"
  vib_inference_interval_sec: 10

# ---------------------------------------------------------------------------
# 数据库与存储
# ---------------------------------------------------------------------------
database:
  path: "data/fire_seed.db"
  wal_mode: true
  synchronous: NORMAL
  log_memory_size: 500

# ---------------------------------------------------------------------------
# 冷数据归档
# ---------------------------------------------------------------------------
cold_storage:
  provider: aliyun_oss
  aliyun_oss:
    endpoint: "oss-cn-hangzhou.aliyuncs.com"
    bucket: "fire-seed-logs"
  lifecycle:
    hot_days: 7
    compression_level: 6
    encryption: true
    upload_interval_sec: 3600

# ---------------------------------------------------------------------------
# 消息推送渠道
# ---------------------------------------------------------------------------
messaging:
  default_channel: telegram
  channels:
    telegram:
      enabled: true
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_ids: [123456789]
      allow_commands: true
    dingtalk:
      enabled: false
    wecom:
      enabled: false
    wechat:
      enabled: false

# ---------------------------------------------------------------------------
# 多账户跟单系统
# ---------------------------------------------------------------------------
copy_trading:
  enabled: false
  master_account: "main"
  accounts: []            # 通过 multi_account.yaml 单独配置
  global_risk:
    max_daily_loss_pct: 3.0
    max_total_leverage: 5.0
    force_close_on_master_flat: true
    max_connection_retries: 3
    retry_delay_sec: 5

# ---------------------------------------------------------------------------
# 前端与安全
# ---------------------------------------------------------------------------
frontend:
  port: 8000
  https: false

auth:
  password_algo: bcrypt
  totp_enabled: true
  jwt_expiry_minutes: 30
  login_fail_delay: 2000
  ip_ban_threshold: 5

# ---------------------------------------------------------------------------
# 进化与自学习安全协议
# ---------------------------------------------------------------------------
evolution:
  max_rollbacks_per_day: 3
  min_shadow_hours: 24
  canary_stages:
    - { ratio: 0.01, min_hours: 6,  max_dd: 0.02 }
    - { ratio: 0.10, min_hours: 12, max_dd: 0.05 }
    - { ratio: 1.00, min_hours: 24, max_dd: 0.10 }
  divergence_threshold: 0.4
  sandbox:
    forbidden_imports: ["os", "subprocess", "socket", "requests"]
    max_code_length: 5000
    max_execution_sec: 30

# ---------------------------------------------------------------------------
# 智能体议会 (16位)
# ---------------------------------------------------------------------------
agents:
  # 通用议会参数
  max_single_weight: 0.35
  min_participation_rate: 0.6
  consensus_overload_threshold: 0.85

  # 对抗式议会配置
  adversarial_council:
    enabled: true
    cooldown_seconds: 1800          # 挑战失败后提议者冷却时间（30分钟）
    anti_consensus_boost: 2.0       # 守护者与炼金术士罕见一致时的信度乘数
    jury_min_members: 2             # 最少陪审员人数

  # 各智能体专属配置
  instances:
    sentinel:
      enabled: true
      worldview: "机械唯物主义"
      check_interval_sec: 15
    alchemist:
      enabled: true
      worldview: "进化论"
      explore_interval_hours: 12
      max_daily_proposals: 10
    guardian:
      enabled: true
      worldview: "存在主义"
      check_interval_sec: 30
      var_warn_mult: 30
      max_drawdown_action: 15
      liquidity_shrink_critical: 0.6
    devils_advocate:
      enabled: true
      worldview: "怀疑论"
      min_challenges_per_round: 1
    godel_watcher:
      enabled: true
      worldview: "不完备定理"
      doubt_threshold: 0.8
      sleep_hours: 24
      min_awake_hours: 6
    env_inspector:
      enabled: true
      worldview: "物理主义"
      check_interval_sec: 60
    redundancy_auditor:
      enabled: true
      worldview: "奥卡姆剃刀"
      scan_interval_hours: 24
    weight_calibrator:
      enabled: true
      worldview: "贝叶斯主义"
      audit_interval_hours: 24
      fdr_q: 0.1
    narrator:
      enabled: true
      worldview: "诠释学"
      report_time: "03:00"
    diversity_enforcer:
      enabled: true
      worldview: "多元主义"
      check_interval_sec: 300
      noise_injection_prob: 0.1
    archive_guardian:
      enabled: true
      worldview: "历史主义"
      check_interval_sec: 3600
    copy_trade_coordinator:
      enabled: false                 # 跟单启用后自动开启
      worldview: "整体论"
      check_interval_sec: 30

    # 新增三位智能体
    execution_auditor:
      enabled: true
      worldview: "实证主义"
      check_interval_sec: 60
      slippage_warn_bps: 2.0        # 滑点告警阈值（基点）
      twap_completion_min: 0.95     # TWAP最低完成率
    dependency_sentinel:
      enabled: true
      worldview: "依赖倒置"
      check_interval_sec: 120
      external_services:
        - name: "deepseek_api"
          max_latency_ms: 2000
        - name: "aliyun_oss"
          max_latency_ms: 1000
        - name: "redis"
          max_latency_ms: 100
    security_awareness:
      enabled: true
      worldview: "安全悲观主义"
      check_interval_sec: 60
      max_failed_logins_per_hour: 10
      jwt_refresh_anomaly_threshold: 5
    data_ombudsman:
      enabled: true
      worldview: "经验主义"
      check_interval_sec: 10
      max_ws_latency_ms: 200
      max_packet_loss_pct: 1.0
      ntp_offset_max_ms: 100

# ---------------------------------------------------------------------------
# 风险与熔断
# ---------------------------------------------------------------------------
risk:
  circuit_breakers:
    level_1: { trigger: 0.03, action: "no_new_entry", stop_tighten: 0.8 }
    level_2: { trigger: 0.05, action: "liquidate_non_arb", cooldown_minutes: 10 }
    level_3: { trigger: 0.08, action: "halt_until_midnight" }
  margin:
    min_maintenance_rate: 150
    liquidation_warning_rate: 180
    stress_test:
      adverse_move_pct: 2.0
      min_pass_rate: 150
  liquidity:
    depth_shrink_warning: 0.4
    depth_shrink_halt: 0.6
    spread_max_pct: 0.5
  position:
    max_single_symbol_pct: 50
    max_net_exposure_pct: 200
  execution:
    max_slippage_pct: 0.15
    consecutive_bad_slippage: 3
    pending_order_timeout_sec: 10
  system:
    max_trades_per_day: 500
    api_rate_per_minute: 960
    max_order_error_rate: 0.02

# ---------------------------------------------------------------------------
# 性能调优
# ---------------------------------------------------------------------------
performance:
  lazy_evaluation: true
  cpu_quota:
    trading: 60
    evolution: 20
    monitoring: 10
    assistant: 10
  factor_thread_pool: 3

# ---------------------------------------------------------------------------
# 第三方 API (LLM 与助手)
# ---------------------------------------------------------------------------
llm:
  local_mode_fallback: true
  providers:
    deepseek:
      enabled: false
      api_key: ${DEEPSEEK_API_KEY}
      endpoint: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
    openai:
      enabled: false
      api_key: ${OPENAI_API_KEY}
      model: "gpt-4o"

# ---------------------------------------------------------------------------
# 数据监察员·对抗性校验
# ---------------------------------------------------------------------------
data_quality:
  adversarial_audit: true             # 与监察者进行结论交叉比对
  global_health_degraded_threshold: 80
