# =============================================================================
# 火种系统 (FireSeed) 认证与授权配置
# =============================================================================
# 本文件存储所有身份验证相关的敏感参数。
# 生产环境中，标记为 ${ENV_VAR} 的值必须通过环境变量注入，不得硬编码于此。
# 密码哈希使用 bcrypt (cost = 12)，TOTP 密钥通过系统主密钥加密后存储。
# =============================================================================

# ---------------------------------------------------------------------------
# 主控密码 (静态密码，用于前端登录)
# ---------------------------------------------------------------------------
auth:
  # 操作密码的 bcrypt 哈希值 (使用 htpasswd -bnBC 12 "" "your_password" 生成)
  # 生产环境务必通过环境变量 AUTH_PASSWORD_HASH 注入
  password_hash: "${AUTH_PASSWORD_HASH}"

  # 密码哈希算法版本: bcrypt (cost=12)
  password_algo: "bcrypt"
  password_cost: 12

# ---------------------------------------------------------------------------
# TOTP 动态验证 (RFC 6238)
# ---------------------------------------------------------------------------
totp:
  # 是否启用 TOTP 二次验证
  enabled: true

  # TOTP 密钥 (经过系统主密钥加密后的 Base64 编码)
  # 生产环境务必通过环境变量 TOTP_ENCRYPTED_KEY 注入
  encrypted_key: "${TOTP_ENCRYPTED_KEY}"

  # TOTP 时间步长 (秒)，通常为 30
  period: 30

  # 允许的时间漂移窗口 (前后各 N 个步长)，1 表示允许 ±30 秒
  drift_window: 1

  # 算法：SHA1 / SHA256 / SHA512
  algorithm: "SHA1"

  # 密钥长度 (位)
  key_length: 160

# ---------------------------------------------------------------------------
# JWT 令牌配置
# ---------------------------------------------------------------------------
jwt:
  # JWT 签名密钥 (推荐使用 256 位随机字符串)
  # 生产环境务必通过环境变量 JWT_SECRET 注入
  secret: "${JWT_SECRET}"

  # 签名算法
  algorithm: "HS256"

  # 访问令牌过期时间 (分钟)
  access_expiry_minutes: 30

  # 刷新令牌过期时间 (天)
  refresh_expiry_days: 7

  # 颁发者
  issuer: "fire_seed"

# ---------------------------------------------------------------------------
# 账户锁定与暴力破解防护
# ---------------------------------------------------------------------------
lockout:
  # 连续登录失败 N 次后临时锁定 (分钟)
  threshold: 5
  lock_minutes: 15

  # 登录失败后延迟时间 (毫秒)，每次失败累加该值
  fail_delay_ms: 2000

  # IP 临时封锁阈值 (失败的独立 IP 数量达到该值后封锁该 IP)
  ip_ban_threshold: 5
  ip_ban_minutes: 60

  # 全局密码错误计数器重置时间 (小时)，适用于所有账户
  global_reset_hours: 24

# ---------------------------------------------------------------------------
# 操作审计日志
# ---------------------------------------------------------------------------
audit:
  # 是否记录所有被鉴权保护的操作
  enabled: true

  # 审计日志保留天数
  retention_days: 90

  # 是否将审计日志异步上传至冷存储
  cold_upload: true

# ---------------------------------------------------------------------------
# 门限签名 (可选，用于 API 密钥管理)
# ---------------------------------------------------------------------------
threshold_signature:
  # 是否启用门限签名
  enabled: false

  # 参与方总数 (例如 3 份分片)
  total_shards: 3

  # 最少需要多少分片才能完成签名 (例如 2)
  required_shards: 2

  # 分片存储位置 (建议跨云存储)
  shard_locations:
    - "aliyun_oss"
    - "tencent_cos"
    - "local_hsm"

# ---------------------------------------------------------------------------
# 多账户跟单认证 (可选)
# ---------------------------------------------------------------------------
copy_trading_auth:
  # 单独的子账户操作是否需要二次密码验证
  require_password: true

# ---------------------------------------------------------------------------
# 说明：
# 1. 可通过以下方式生成 bcrypt 哈希：
#    python -c "import bcrypt; print(bcrypt.hashpw(b'password', bcrypt.gensalt(12)).decode())"
# 2. TOTP 密钥可通过火种助手生成，并存储加密后的值。
# 3. JWT_SECRET 可使用 openssl rand -hex 32 生成。
# =============================================================================
