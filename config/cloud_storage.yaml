# =============================================================================
# 火种系统 (FireSeed) 冷数据归档与云存储配置
# =============================================================================
# 支持多云平台适配：阿里云 OSS、腾讯云 COS、AWS S3、MinIO
# 敏感凭证通过环境变量注入，禁止硬编码于此文件。
# =============================================================================

# 当前使用的云平台 (aliyun_oss / tencent_cos / aws_s3 / minio)
provider: aliyun_oss

# 阿里云 OSS 配置
aliyun_oss:
  # 地域节点 (外网或内网)
  endpoint: "oss-cn-hangzhou.aliyuncs.com"
  # 存储空间名称
  bucket: "fire-seed-logs"
  # 访问密钥通过环境变量 OSS_ACCESS_KEY_ID 和 OSS_ACCESS_KEY_SECRET 注入

# 腾讯云 COS 配置
tencent_cos:
  region: "ap-guangzhou"
  bucket: "fire-seed-logs-1250000000"
  # 密钥通过环境变量 TENCENT_SECRET_ID 和 TENCENT_SECRET_KEY 注入

# AWS S3 配置
aws_s3:
  region: "us-east-1"
  bucket: "fire-seed-logs"
  # 密钥通过标准 AWS 环境变量 AWS_ACCESS_KEY_ID 和 AWS_SECRET_ACCESS_KEY 注入、
  # 或 IAM 角色自动获取

# MinIO (私有部署) 配置
minio:
  endpoint: "localhost:9000"
  bucket: "fire-seed-logs"
  secure: false                      # 是否使用 HTTPS
  access_key: ${MINIO_ACCESS_KEY}
  secret_key: ${MINIO_SECRET_KEY}

# 生命周期与归档策略
lifecycle:
  # 本地数据保留天数 (热数据)，超过后将被压缩并上传至云存储
  hot_days: 7

  # 归档文件压缩级别 (0-9, 0 无压缩, 9 最高压缩)
  compression_level: 6

  # 是否在归档前使用 AES-256 加密
  encryption: true
  # 加密密钥通过环境变量 COLD_STORAGE_ENCRYPTION_KEY 注入，长度需为 32 字节

  # 云存储上传间隔 (秒)，周期性扫描本地过期数据并批量上传
  upload_interval_sec: 3600

  # 上传失败重试次数
  max_retries: 3

  # 重试间隔 (秒)
  retry_delay_sec: 300

  # 上传后是否验证对象完整性 (通过 CRC/MD5)
  integrity_check: true

  # 是否启用云平台自带的生命周期规则 (如自动转为归档存储类型)
  use_native_lifecycle: true
  # 云存储归档转换天数 (对象上传后 N 天转为归档存储以降低成本)
  archive_transition_days: 90

  # 本地归档索引数据库文件 (记录云端对象与本地文件的映射)
  index_db: "data/archive_index.db"

# 多账户跟单的冷数据独立存储 (可选)
copy_trading_archive:
  enabled: false
  bucket: "fire-seed-copy-trading"
  hot_days: 30

# 日志分级归档策略
log_levels_to_archive:
  - INFO
  - WARN
  - ERROR
  - CRITICAL
  # DEBUG 日志默认不归档，仅保留在本地环形缓冲区
