# =============================================================================
# 火种系统 (FireSeed) 因子权重配置
# =============================================================================
# 本文件由条件权重引擎 (ConditionalWeightEngine) 自动生成与维护，
# 每次权重更新后将覆盖写入，并保留最近 5 个版本快照于 config/archived_weights/。
# 手工编辑需谨慎，修改后将在下一个 K 线闭合时触发热重载。
# =============================================================================

# 权重配置版本 (格式: 年月日-序号，自动递增)
version: "20260430-01"

# 权重最近一次计算的时间戳 (ISO 8601)
last_calibrated: "2026-04-30T02:15:00+08:00"

# 当前权重适用的市场状态 (若使用模糊隶属度，则此项为空)
current_regime: "trend"

# 权重校准时的IC计算窗口 (天)
calibration_window: 20

# ---------------------------------------------------------------------------
# 核心因子 (总权重约 60%)
# 这些因子直接决定趋势方向与市场结构，任何修改需通过幽灵验证。
# ---------------------------------------------------------------------------
core_factors:
  trend_strength: 0.25               # 锁相环频率 × 粒子滤波瞬时夏普
  vib_pressure: 0.20                 # VIB 深度学习提取的买卖压力
  regime_fit: 0.15                   # 赫斯特指数 + 震荡过滤器组合状态匹配度

# ---------------------------------------------------------------------------
# 辅助因子 (总权重约 40%)
# 提供确认或否决，单独不能主导决策。
# ---------------------------------------------------------------------------
auxiliary_factors:
  obi_accel: 0.10                    # 订单簿不平衡 (OBI) 的二阶导 / 加速度
  retest_quality: 0.08               # 回踩 MA12 质量评分 (成交量衰减+弹性)
  funding_env: 0.07                  # 资金费率环境得分 (方向一致性)
  volume_pulse: 0.05                 # 成交量脉冲强度 (当前量 / 均量)
  pinbar: 0.05                       # Pin Bar / 下影线反转信号强度
  iceberg_detect: 0.05               # 冰山订单检测概率 (挂单墙被蚕食)
  macro_event_risk: 0.05             # 宏观经济日历事件风险惩罚因子 (反向)

# ---------------------------------------------------------------------------
# 因子状态备注
# ---------------------------------------------------------------------------
factor_notes:
  obi_v2: "因 PSI > 0.25 已被冻结，权重置零，等待下个校准周期复查。"
  volatility_v2: "因波动率门控触发，权重临时冻结，当前值为 0.00。"
