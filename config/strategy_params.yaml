# =============================================================================
# 火种系统 (FireSeed) 策略参数配置
# =============================================================================
# 本文件定义所有策略的核心参数，支持按周期、行情模式（趋势/震荡）分层配置。
# 系统运行时通过策略管理器动态读取这些参数，并可在幽灵影子中热校验。
# =============================================================================

# ---------------------------------------------------------------------------
# 全局默认值 (当各策略未显式指定时使用)
# ---------------------------------------------------------------------------
global_defaults:
  base_lot: 0.01            # 基础手数 (BTCUSDT)
  max_leverage: 3           # 最大杠杆倍数
  stop_mode: dynamic_atr    # 止损模式: fixed / dynamic_atr / pid_adaptive
  take_profit_mode: volume_decay  # 止盈模式: fixed / volume_decay / multi_stage

# ---------------------------------------------------------------------------
# 1分钟趋势压榨策略 (FireSeed 1m Trend)  -- 多模式共存参数
# ---------------------------------------------------------------------------
trend_1m:
  # 通用参数
  enabled: true
  description: "四维共振进场+盈利加仓+非线性紧缩止损"
  max_layers_hard: 20          # 硬性最大加仓次数
  min_bars_between_adds: 3     # 加仓最小冷却K线数

  # 激进模式参数 (strategy_mode: aggressive)
  aggressive:
    entry:
      resonance_prob_threshold: 58            # 四维共振最低评分阈值 (0-100)
      obi_min: 0.30                            # 订单簿不平衡最低值
      trend_freq_min: 0.008                    # 锁相环最低频率
      volume_ratio_min: 1.0                   # 成交量相对20均线最低倍数
    add_position:
      profit_atr_threshold: 0.6              # 浮盈达到ATR倍数触发加仓
      lot_ratios: [1.0, 1.2, 1.0, 0.7, 0.4, 0.4] # 第N次加仓手数相对首仓比例
      cooldown_bar_factor: 1                 # 冷却K线数 = 当前层数 + 此值
      max_risk_pct: 0.025                    # 总浮动亏损权益占比上限
    stop_loss:
      base_atr_mult: 1.3                     # 初始止损ATR倍数
      min_atr_mult: 0.35                     # 最紧止损ATR倍数
      layer_decay: 0.18                      # 每加一层止损衰减系数
      profit_decay: 0.06                     # 每多1倍浮盈ATR，止损衰减系数
    exhaustion:
      enable_rsi_divergence: true
      enable_delta_divergence: true
      partial_close_pct: 0.5                 # T-1阶段平仓比例
      final_close_pct: 1.0                   # T-0阶段平仓剩余全部

  # 稳健模式参数 (strategy_mode: moderate)
  moderate:
    entry:
      resonance_prob_threshold: 65
      obi_min: 0.40
      trend_freq_min: 0.015
      volume_ratio_min: 1.3
    add_position:
      profit_atr_threshold: 0.8
      lot_ratios: [1.0, 1.0, 0.8, 0.5, 0.3, 0.3]
      cooldown_bar_factor: 2
      max_risk_pct: 0.015
    stop_loss:
      base_atr_mult: 1.5
      min_atr_mult: 0.4
      layer_decay: 0.15
      profit_decay: 0.04
    exhaustion:
      enable_rsi_divergence: true
      enable_delta_divergence: true
      partial_close_pct: 0.6
      final_close_pct: 1.0

# ---------------------------------------------------------------------------
# 震荡马丁策略 (Oscillation Martingale)
# ---------------------------------------------------------------------------
oscillation:
  enabled: true
  description: "基于震荡识别、OBI极端值、动态ATR阶梯加仓的均值回归策略"
  entry:
    ci_min: 55.0               # Choppiness Index 最低值
    hurst_bf_max: 3.0          # 赫斯特指数贝叶斯因子最大值 (反持久判定)
    obi_long_threshold: -0.4   # 做多要求 OBI < -0.4 (极端卖压)
    obi_short_threshold: 0.4   # 做空要求 OBI > 0.4
    volume_spike_ratio: 1.3    # 成交量突增倍数
    pin_bar_lower_wick_ratio: 0.7  # 下影线占比阈值
  grid:
    atr_band_mult: 1.5         # 区间宽度 = MA12 +/- ATR*band_mult
    base_lot: 0.01
    max_layers: 8              # 最大加仓次数
    lot_growth: 1.3            # 加仓手数增长系数 (相对前一仓)
    stop_loss: "区间边界外1.5倍ATR"  # 止损描述
    tp_mode: "均价止盈"         # 止盈模式
    tp_atr_mult: 0.5           # 止盈 ATR 倍数
  risk:
    daily_loss_limit_pct: 0.015   # 单日亏损占比上限
    cool_after_consecutive_stop: 2  # 连续止损后冷却小时数

# ---------------------------------------------------------------------------
# 资金费率套利策略
# ---------------------------------------------------------------------------
funding_arb:
  enabled: true
  description: "现货+合约对冲，赚取极端资金费率"
  entry:
    positive_rate_threshold: 0.0015   # 正费率入场阈值
    negative_rate_threshold: -0.0010  # 负费率入场阈值
    min_basis_pct: 0.2                # 最小基差要求
  exit:
    funding_back_to: 0.0003           # 费率回归至该水平出场
    max_hold_hours: 8                 # 最长持仓时间
    basis_emergency_close: 0.5        # 基差扩大至该百分比强制退出
  capital_allocation: 0.20            # 占总权益的20%资金池

# ---------------------------------------------------------------------------
# 极端行情策略库 (黑天鹅/波动率套利)
# ---------------------------------------------------------------------------
extreme:
  volatility_arb:
    enabled: false                     # 默认不启用，由事件触发
    trigger_vix_spike: 3.0            # 波动率突然飙升倍数
    auto_activate: true                # 是否自动激活
    position:
      type: "strangle"                # 策略类型: 宽跨式
      max_margin_pct: 0.10            # 最大保证金占比
    exit:
      vix_drop_ratio: 0.5             # 波动率回落比例
      time_limit_hours: 24

# ---------------------------------------------------------------------------
# 参数版本管理与影子验证
# ---------------------------------------------------------------------------
shadow_validation:
  # 新参数或策略上线前必须在幽灵环境中运行的最低小时数
  min_hours: 24
  # 统计显著性检验标准
  t_test_alpha: 0.05
  # 是否要求在所有市场状态下夏普均非负
  require_regime_non_negative: true
  # 悲观滑点调整系数 (在幽灵模拟中的滑点惩罚)
  pessimistic_slippage_factor: 1.3

# ---------------------------------------------------------------------------
# 因子权重校准 (动态权重引擎核心参数)
# ---------------------------------------------------------------------------
weight_calibration:
  update_interval_hours: 24          # 权重更新间隔
  ic_window_days: 20                 # IC计算窗口
  decay_halflife: 15                 # 指数衰减半衰期 (天)
  l2_lambda: 0.3                     # 权重平滑L2正则化强度
  vol_freeze_percentile: 0.80        # 波动率超过历史80%分位时冻结权重
  min_ic_threshold: 0.02             # 最低IC阈值，低于此值的因子权重不提升
  fdr_q: 0.1                         # 错误发现率控制q值
  conditional_fuzzy: true            # 是否启用模糊隶属度平滑

# ---------------------------------------------------------------------------
# 多周期仲裁器参数
# ---------------------------------------------------------------------------
arbiter:
  veto:
    confidence_percentile: 95        # 大周期否决置信度分位数
    cooldown_seconds: 1800           # 否决冷却期 (30分钟)
    veto_correct_rate_freeze: 0.40   # 若否决后小周期正确率超40%，冻结否决
  resonance:
    min_effectiveness_ratio: 1.3     # 共振有效性比率阈值
    min_confidence_above_median: true # 各周期评分需高于自身历史中位数
    max_multiplier: 1.6              # 最大共振乘数
  pre_veto:
    enable: true                     # 启用大周期预判否决
    completion_weight_factor: 0.7    # K线完成度权重衰减
