# =============================================================================
# 火种系统 · 策略参数池 (strategy_params.yaml)
# 本文件定义所有策略模板的默认参数，支持金丝雀发布、A/B测试及版本管理。
# 修改后可通过热重载即时生效，无需重启引擎。
# =============================================================================

# ----------------------------- 全局默认模式 -----------------------------
global:
  mode: moderate                     # 策略模式: aggressive (激进) | moderate (平稳)
  version: "3.0.0"                  # 配置版本
  last_updated: "2026-04-27"        # 最后更新日期

# ----------------------------- 激进与平稳模式配置映射 -----------------------------
mode_profiles:
  aggressive:
    score_threshold_long: 58         # 做多评分阈值 (满分100)
    score_threshold_short: 42        # 做空评分阈值
    position_multiplier: 1.2         # 仓位乘数
    cooldown_bars: 2                 # 加仓冷却K线数
    stop_atr_mult: 1.3               # 止损ATR倍数
    max_entries: 3                   # 最大加仓次数
    resonance_boost: 1.25            # 共振系数放大
  moderate:
    score_threshold_long: 65
    score_threshold_short: 35
    position_multiplier: 1.0
    cooldown_bars: 3
    stop_atr_mult: 1.5
    max_entries: 2
    resonance_boost: 1.15

# ----------------------------- 多周期策略配置 -----------------------------
timeframes:
  1m:
    enabled: true
    engine: trend                    # 趋势引擎类型
    atr_period: 5
    stop_multiplier: 1.5
    max_entries: 3
    cooldown_bars: 2
    hull_ma_period: 9
    weight_sets:                     # 不同市场状态下的因子权重集
      trend:                         # 趋势市场
        trend_strength: 0.30
        vib_pressure: 0.25
        ob_micro: 0.20
        retest_quality: 0.15
        volume_pulse: 0.10
      oscillation:                   # 震荡市场
        trend_strength: 0.10
        vib_pressure: 0.15
        ob_micro: 0.35
        range_position: 0.25
        pinbar: 0.15
      high_vol:                      # 高波动市场
        trend_strength: 0.15
        vib_pressure: 0.20
        vol_adapt: 0.30
        env_regime: 0.20
        risk_budget: 0.15
  3m:
    enabled: true
    engine: trend
    atr_period: 10
    stop_multiplier: 1.8
    max_entries: 2
    cooldown_bars: 4
    hull_ma_period: 12
    weight_sets:
      trend:
        trend_strength: 0.35
        vib_pressure: 0.20
        ob_micro: 0.15
        energy_ray: 0.15
        env_regime: 0.15
  5m:
    enabled: true
    engine: trend
    atr_period: 14
    stop_multiplier: 2.0
    max_entries: 1
    cooldown_bars: 6
    hull_ma_period: 21
    weight_sets:
      trend:
        trend_strength: 0.40
        env_regime: 0.25
        vol_adapt: 0.20
        funding_env: 0.15
  15m:
    enabled: true
    engine: macro                    # 宏观守护引擎
    atr_period: 20
    stop_multiplier: 3.0
    max_entries: 1
    cooldown_bars: 8
    weight_sets:
      trend:
        trend_strength: 0.35
        macro_factors: 0.30          # 稳定币市值、ETF净流入等
        env_regime: 0.20
        vol_adapt: 0.15

# ----------------------------- 趋势策略子模块参数 -----------------------------
trend_following:
  entry_confirm_ticks: 3             # 突破确认Tick数
  obi_entry_threshold_long: 0.4      # OBI做多阈值
  obi_entry_threshold_short: -0.4    # OBI做空阈值
  breakout_volume_mult: 1.5          # 突破成交量放大倍数要求
  retest_score_strong: 0.75          # 回踩强加仓分界
  retest_score_weak: 0.5             # 回踩弱加仓分界
  exhaustion_flat_coeff: 0.75        # 衰减平仓系数 μ
  cvd_acceleration_window: 10        # CVD加速度窗长(秒)
  delta_divergence_threshold: 0.5    # Delta散度预警阈值
  pid_kp: 0.6
  pid_ki: 0.1
  pid_kd: 0.2
  trailing_stop_activation_profit: 0.3  # 移动止损触发所需浮盈百分比

# ----------------------------- 震荡策略子模块参数 -----------------------------
oscillation:
  choppiness_threshold: 61.8         # CI震荡判定阈值
  range_atr_mult: 1.5                # 网格边界ATR倍数
  grid_levels: 3                     # 网格层数
  obi_extreme_long: -0.5             # 下沿做多OBI极值
  obi_extreme_short: 0.5             # 上沿做空OBI极值
  take_profit_mid_pct: 0.3           # 首批止盈百分比 (MA12中线)
  take_profit_far_pct: 0.5           # 二批止盈百分比 (区间上/下轨)
  stop_outside_pct: 0.3              # 边界外止损偏移
  tick_scalp_enabled: true            # 是否启用Tick级刮头皮
  tick_scalp_consecutive: 5           # 连续同向笔数触发
  tick_scalp_volume_mult: 1.5
  tick_scalp_fixed_tp: 0.5           # 固定止盈百分比

# ----------------------------- 资金费率套利子模块参数 -----------------------------
funding_arbitrage:
  capital_allocation: 0.20           # 资金分配比例
  entry_rate_positive: 0.15          # 正费率入场阈值 (%)
  entry_rate_negative: -0.10         # 负费率入场阈值 (%)
  basis_exit_pct: 0.5                # 基差扩大止盈/止损
  max_holding_hours: 8
  min_funding_rate_profit: 0.03      # 回归目标

# ----------------------------- 极端行情策略库参数 -----------------------------
extreme_scenarios:
  volatility_arbitrage:
    enabled: true
    trigger_atr_mult: 3.0            # 波动率超常触发倍数
    stop_width: 0.03                 # 宽止损百分比
    position_scale: 0.1              # 极小仓位
  black_swan_recovery:
    enabled: false                   # 默认关闭，需通过宏观情景激活
    trigger_mmd: 5.0                 # 分布偏差马氏距离阈值

# ----------------------------- 学习与进化时段参数 -----------------------------
learning_window:
  start_hour: 1                      # 凌晨1点
  start_minute: 30
  end_hour: 4
  end_minute: 30
  nightmare_vol_mult: 2.0            # 惊梦波动率倍数
  learning_mode_risk_reduction: 0.5  # 学习时段仓位减半
  learning_mode_stop_mult: 0.7       # 止损收紧系数

# ----------------------------- 自进化引擎参数 -----------------------------
evolution:
  genetic_algorithm:
    population_size: 50
    generations: 20
    immigration_rate: 0.15           # 外来野化基因比例
    mutation_rate: 0.1
    crossover_rate: 0.7
  shadow_validation:
    min_days: 7                      # 最小验证天数
    significance_level: 0.05         # t检验α
    impact_simulation: true
    pessimistic_mode: true           # 悲观滑点实例
  llm_factor_generation:
    max_retries: 3
    sandbox_timeout_sec: 30
    economic_filter: true
    monotonicity_test: true          # 单调性测试

# ----------------------------- 风控全局参数（引用risk_limits.yaml的默认值覆盖） -----------------------------
risk_controls:
  daily_loss_limit: 0.05             # 单日亏损硬性限额 (5%)
  max_total_drawdown: 0.15           # 总回撤熔断
  circuit_breaker_level1_amp: 0.03   # 一级熔断振幅
  circuit_breaker_level2_amp: 0.05   # 二级熔断振幅
  liquidity_depth_min_ratio: 0.5     # 深度衰减最低比值
  max_slippage_per_trade: 0.0015     # 最大允许滑点

# ----------------------------- 金丝雀发布参数 -----------------------------
canary:
  stages:
    - weight: 0.01                   # 1%资金
      duration_minutes: 1440         # 24小时
    - weight: 0.10
      duration_minutes: 1440
    - weight: 1.0
      duration_minutes: 0            # 全量后持续观察
  health_checks:
    min_sharpe: 0.5
    max_drawdown: 0.05
    min_winrate: 0.40
    psi_limit: 0.25

# ----------------------------- 多因子信号库开关（可动态组合） -----------------------------
factor_toggles:
  obi: true
  obi_accel: true
  cvd: true
  cvd_accel: true
  vib_buy_pressure: true
  vib_sell_pressure: true
  pll_frequency: true
  pll_lock: true
  hurst_bf: true
  retest_score: true
  volume_spike: true
  iceberg_detect: true
  pinbar: true
  funding_rate_env: true
  stablecoin_flow: false             # 默认关闭以节省计算
  eft_flow: false
  sentiment_nlp: false

# ----------------------------- 策略组合优化参数 -----------------------------
portfolio_optimizer:
  method: "risk_parity"              # 可选: markowitz, risk_parity, equal_weight
  rebalance_interval_minutes: 30
  max_correlation: 0.7               # 策略间最大允许相关系数
  dynamic_allocation: true
  top_n_strategies: 5
