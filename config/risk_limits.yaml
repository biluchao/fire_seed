# =============================================================================
# 火种系统 · 风险限额配置
# 文件路径: config/risk_limits.yaml
# 说明: 所有阈值均可在前端面板经二次密码验证后热修改，修改记录审计。
# =============================================================================

global:
  # 总权益 (USDT) - 用于计算百分比风险
  initial_equity: 100000
  # 最大总杠杆 (全仓倍数)
  max_total_leverage: 3.0
  # 单日最大亏损比例 (达到后触发一级熔断并禁止新开仓)
  max_daily_loss_pct: 0.05
  # 连续亏损笔数上限 (达到后暂停交易1小时)
  max_consecutive_losses: 5

# -----------------------------------------------------------------------------
# 三级熔断机制 (以账户权益回撤为基准)
# -----------------------------------------------------------------------------
circuit_breaker:
  level_1:
    drawdown_pct: 0.03          # 回撤3%
    action: "禁止加仓，收紧止损至ATR×0.8"
    cooldown_minutes: 60
  level_2:
    drawdown_pct: 0.05          # 回撤5%
    action: "清除非套利仓位，禁止开仓10分钟"
    cooldown_minutes: 10
  level_3:
    drawdown_pct: 0.08          # 回撤8%
    action: "全部平仓，停止交易24小时，推送紧急告警"
    cooldown_hours: 24

# -----------------------------------------------------------------------------
# 流动性风险控制
# -----------------------------------------------------------------------------
liquidity:
  # 订单簿深度最低要求 (挂单量/开仓量比例)
  min_depth_ratio: 50           # 前20档总深度不低于开仓量的50倍
  # 价差上限 (买卖价差/中间价)
  max_spread_pct: 0.0015       # 0.15%
  # 深度衰减预警 (当前深度/过去1小时均值的比例)
  depth_decay_warning: 0.5     # 低于50%暂停新开仓
  # 逐笔滑点上限 (单笔成交相对挂单价的最大滑点)
  max_slippage_pct: 0.0015     # 0.15%
  # 流动性LSTM预测熔断 (预测深度下降比例阈值)
  liquidity_lstm_drop_threshold: 0.5
  # 流动性真空保护：连续N笔滑点超标即触发局部熔断
  slippage_consecutive_limit: 3

# -----------------------------------------------------------------------------
# 保证金与强平安全边际
# -----------------------------------------------------------------------------
margin:
  # 最低维持保证金率 (低于此值不接受新开仓)
  min_maintenance_margin_pct: 1.5
  # 开仓前预估保证金率 (含最不利价格变动)
  initial_margin_buffer_pct: 2.0
  # 强平预警线 (标记价格计算)
  liquidation_warning_pct: 1.8
  # 极端场景压力保证金率 (每日压力测试用)
  stress_test_margin_pct: 5.0

# -----------------------------------------------------------------------------
# 策略级仓位限制
# -----------------------------------------------------------------------------
position_limits:
  # 单品种最大名义价值 (USDT)
  max_notional_per_symbol: 50000
  # 单策略最大保证金占用比例
  max_margin_per_strategy_pct: 0.20
  # 单策略连续加仓次数上限 (随能量动态调整，此为绝对上限)
  max_pyramid_entries: 3
  # 震荡策略专用 (限制更严)
  oscillation:
    max_notional: 20000
    max_margin_pct: 0.10
    max_pyramid_entries: 0      # 禁止加仓
  # 套利策略专用
  arbitrage:
    max_notional: 100000
    max_margin_pct: 0.40
    max_pyramid_entries: 0

# -----------------------------------------------------------------------------
# 资金费率极端保护
# -----------------------------------------------------------------------------
funding_rate:
  # 正费率阈值 (做多时需警惕多头拥挤)
  warning_threshold: 0.001      # 0.1%
  # 极端阈值 (强制平掉30%多头或禁止开多)
  extreme_threshold: 0.0025     # 0.25%
  # 费率套利模块入场最低费率
  arbitrage_entry_threshold: 0.0015
  # 费率套利出场阈值 (回归)
  arbitrage_exit_threshold: 0.0003
  # 资金费率结算前平仓保护 (分钟)
  close_before_settlement_min: 5

# -----------------------------------------------------------------------------
# 多策略相关性约束 (防止集体崩溃)
# -----------------------------------------------------------------------------
correlation:
  # 策略收益序列相关性上限 (超过后强制降低低夏普策略仓位)
  max_correlation: 0.7
  # 计算窗口 (天)
  lookback_days: 20
  # 相关性超限时的降权比例
  reduction_factor: 0.5

# -----------------------------------------------------------------------------
# 黑天鹅 / 极端行情防御
# -----------------------------------------------------------------------------
tail_risk:
  # 振幅熔断 (1分钟内振幅超过此值暂停开仓)
  intraday_amplitude_threshold: 0.05
  # 熔断冷却时间 (秒)
  amplitude_cooldown_sec: 300
  # 极端事件策略库激活条件 (波动率分位数)
  extreme_regime_percentile: 0.95
  # 无条件停堆棒：马氏距离超过历史最大值倍数
  mahalanobis_multiplier: 3.0
  # 对手方撤单率压力测试 (最大可承受撤单率)
  max_withdrawal_rate: 0.5

# -----------------------------------------------------------------------------
# 操作风险与人机交互安全
# -----------------------------------------------------------------------------
operational:
  # 人工修改风控参数的冷静期 (秒)
  human_cooling_period_sec: 7200
  # 门限签名分片数
  threshold_key_shares: 3
  # 恢复所需最小分片数
  threshold_key_required: 2
  # OTP二次验证有效期 (秒)
  otp_ttl_sec: 300

# -----------------------------------------------------------------------------
# 每日自动对账与审计
# -----------------------------------------------------------------------------
reconciliation:
  # 启用每日自动对账
  enabled: true
  # 执行时间 (UTC)
  schedule_hour: 0
  # 允许的最大差异比例 (实际成交 vs 本地记录)
  max_discrepancy_pct: 0.001

# -----------------------------------------------------------------------------
# 学习时段特殊风控 (01:30-04:30)
# -----------------------------------------------------------------------------
learning_period:
  # 启用收紧模式
  tightened: true
  # ATR止损倍数
  atr_multiplier: 0.7
  # 最大仓位比例 (相对于正常模式)
  position_cap_pct: 0.5
  # 禁止加仓
  allow_pyramid: false
  # 强制每小时深度校验
  force_depth_check_interval_min: 60
  # 惊梦阈值 (波动率超过24h均值的倍数)
  nightmare_vol_multiplier: 2.0
