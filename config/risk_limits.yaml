# =============================================================================
# 火种系统 (FireSeed) 风险限额与熔断参数配置
# =============================================================================
# 本文件定义所有硬性风控阈值。任何一笔订单或持仓在生成前都必须通过以下
# 校验，否则将被拒绝或触发降级处理。所有百分比均表示权益占比 (%)。
# =============================================================================

# ---------------------------------------------------------------------------
# 熔断机制 (三级递进)
# ---------------------------------------------------------------------------
circuit_breakers:
  # 第一级：仅禁止新开仓，现有仓位止损收紧至 ATR×0.8
  level_1:
    trigger: 0.03           # 当日累计已实现+未实现亏损达到权益的3%
    action: "no_new_entry"  # 动作：禁止开新仓
    stop_tighten: 0.8       # 止损倍数自动收紧为标准值的80%

  # 第二级：平掉所有非套利仓位，暂停交易10分钟
  level_2:
    trigger: 0.05           # 当日累计亏损达到权益的5%
    action: "liquidate_non_arb" # 平掉所有非资金费率套利仓位
    cooldown_minutes: 10

  # 第三级：全平，停止交易至次日 00:00
  level_3:
    trigger: 0.08           # 当日累计亏损达到权益的8%
    action: "halt_until_midnight"

# ---------------------------------------------------------------------------
# 保证金与流动性
# ---------------------------------------------------------------------------
margin:
  # 最低维持保证金率 (%): 当预估保证金率低于此值时，拒绝新开仓
  min_maintenance_rate: 150

  # 强平预警线 (%): 低于此值发出Telegram/钉钉告警
  liquidation_warning_rate: 180

  # 开仓前保证金压力测试：假设新仓成交后价格反向波动时的保证金率
  stress_test:
    adverse_move_pct: 2.0   # 模拟价格反向波动百分比
    min_pass_rate: 150      # 模拟后保证金率必须高于此值才允许开仓

liquidity:
  # 订单簿深度熔断
  # 当 (卖一至卖五总深度 + 买一至买五总深度) 较过去1小时均值萎缩比例超过阈值时触发
  depth_shrink_warning: 0.4  # 40% 告警
  depth_shrink_halt: 0.6     # 60% 禁止开仓

  # 最优买卖价差 (Bid-Ask Spread) 熔断
  spread_max_pct: 0.5        # 价差超过0.5% 暂停开仓

  # 流动性压力持续时间 (秒)，上述条件需持续超过此时间才生效，避免瞬态触发
  stress_duration_sec: 5

# ---------------------------------------------------------------------------
# 仓位与头寸限制
# ---------------------------------------------------------------------------
position:
  # 单一品种最大保证金占用 (占总权益比例)
  max_single_symbol_pct: 50

  # 单一方向最大净敞口 (所有品种总和，绝对值)
  max_net_exposure_pct: 200  # 杠杆限制内的总敞口

  # 多账户跟单系统：单子账户最大跟单仓位占比
  copy_trading_max_sub_pct: 80

  # 学习时段 (01:30-04:30) 仓位额外限制
  learning_session_limits:
    max_single_symbol_pct: 25   # 学习期间单品种仓位减半
    stop_atr_mult: 0.6          # 学习期间止损更紧

# ---------------------------------------------------------------------------
# 波动率与回撤
# ---------------------------------------------------------------------------
volatility:
  # ATR 百分比动态熔断
  # 当 1 分钟振幅 (High-Low)/Open 超过此阈值时暂停开仓
  amplitude_halt_pct: 5.0       # 一级熔断 (仅停止开仓)
  amplitude_cooldown_minutes: 5 # 冷却时间

  # 日内波动率异常
  vol_spike_warning: 3.0        # 实时波动率超过过去24小时均值的3倍时告警

drawdown:
  # 从历史最高权益回撤
  max_drawdown_warning: 0.10    # 10% 黄色告警
  max_drawdown_halt: 0.15       # 15% 强制停止所有策略并通知人工

# ---------------------------------------------------------------------------
# 执行与滑点
# ---------------------------------------------------------------------------
execution:
  # 单笔市价单最大滑点容忍 (%)
  max_slippage_pct: 0.15

  # 连续滑点告警：若连续 N 笔成交滑点超过上述阈值，触发临时冻结
  consecutive_bad_slippage: 3

  # 最大挂单持续未成交时间 (秒)，超时则自动撤单并改用市价重试
  pending_order_timeout_sec: 10

# ---------------------------------------------------------------------------
# 资金费率保护
# ---------------------------------------------------------------------------
funding:
  # 预测资金费率 (绝对值) 超过此值，禁止该方向开仓
  max_rate_for_entry: 0.0015

  # 结算前 N 分钟内，若预测资金费率绝对值仍过高，强制减仓
  pre_settle_minutes: 15
  pre_settle_max_rate: 0.001

# ---------------------------------------------------------------------------
# 策略级风险控制
# ---------------------------------------------------------------------------
strategy:
  # 单策略单日最大亏损 (权益占比)，超过则禁用该策略24小时
  max_daily_loss_pct: 0.02

  # 连续止损次数上限，超过则冷却该策略
  max_consecutive_losses: 5
  strategy_cooldown_minutes: 60

  # 震荡策略专用限制
  oscillation:
    max_layers: 8          # 最大加仓次数
    total_risk_pct: 0.015  # 单品种所有震荡仓位总风险

  # 趋势策略专用限制
  trend:
    max_add_layers: 20     # 最大加仓次数 (硬限制)
    min_add_interval_bars: 3  # 最小加仓间隔 K 线数
    max_margin_pct: 40     # 保证金占用超过此值禁止加仓

# ---------------------------------------------------------------------------
# 系统级安全
# ---------------------------------------------------------------------------
system:
  # 日交易次数上限 (防异常高频)
  max_trades_per_day: 500

  # API 限频保护：每分钟最大 REST 请求数 (币安限制为1200，取80%安全值)
  api_rate_per_minute: 960

  # 订单错误率 (当日)
  max_order_error_rate: 0.02  # 错误率超过2%暂停交易

  # 最大自成交检测 (同一账户内)
  self_trade: reject  # 拒绝自成交订单
